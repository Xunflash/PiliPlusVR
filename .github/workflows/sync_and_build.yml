name: Build ARM64 APK on Sync

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Get Flutter version from pubspec.yaml
        id: flutter_version
        run: |
          FLUTTER_VER=$(grep '^\s*flutter:' pubspec.yaml | head -1 | sed 's/.*flutter:\s*//' | sed 's/\s*#.*//')
          echo "version=$FLUTTER_VER" >> $GITHUB_OUTPUT
          echo "Flutter version: $FLUTTER_VER"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.flutter_version.outputs.version }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build ARM64 APK
        run: flutter build apk --release --target-platform android-arm64

      - name: Get upstream latest release version
        id: upstream_version
        run: |
          UPSTREAM_VERSION=$(curl -s "https://api.github.com/repos/bggRGjQaUbCoE/PiliPlus/releases/latest" | grep '"tag_name":' | sed -E 's/.*"tag_name": "([^"]+)".*/\1/')
          echo "version=$UPSTREAM_VERSION" >> $GITHUB_OUTPUT
          echo "Upstream version: $UPSTREAM_VERSION"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.upstream_version.outputs.version }}
          name: ${{ steps.upstream_version.outputs.version }}
          body: "Auto-built from upstream sync"
          files: build/app/outputs/flutter-apk/app-release.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
